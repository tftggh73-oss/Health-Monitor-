<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Giám Sát Sức Khỏe - Tổng Quan</title>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TRANG DANH SÁCH BỆNH NHÂN -->
  <div id="patientListPage">
   <div class="top-header">
  <div class="school-logo-box">
    <img src="Logo HCM-UTE_2.png?v=1" alt="Logo trường" class="school-logo">
  </div>
  <div class="school-name">
    <p>TRƯỜNG ĐẠI HỌC CÔNG NGHỆ KỸ THUẬT TP.HCM</p>
    <p class="school-location">Ho Chi Minh City University of Technology and Engineering</p>
  </div>
</div>
<div class="system-title">
  <h1>HỆ THỐNG GIÁM SÁT SỨC KHỎE</h1>
  <p>VUI LÒNG CHỌN BỆNH NHÂN GIÁM SÁT</p>
</div>
  <div class="patient-row">
  <div class="patient-item" onclick="selectPatientSafe('patient_01', document.getElementById('patientLabel_patient_01').innerText)">
  <img src="BN1.png" class="patient-image">
  <p id="patientLabel_patient_01">A</p>
</div>
<div class="patient-item" onclick="selectPatientSafe('patient_02', document.getElementById('patientLabel_patient_02').innerText)">
  <img src="BN2.png" class="patient-image">
  <p id="patientLabel_patient_02">B</p>
</div>
<div class="patient-item" onclick="selectPatientSafe('patient_03', document.getElementById('patientLabel_patient_03').innerText)">
  <img src="BN3.png" class="patient-image">
  <p id="patientLabel_patient_03">C</p>
</div>
<div class="patient-item" onclick="selectPatientSafe('patient_04', document.getElementById('patientLabel_patient_04').innerText)">
  <img src="BN4.png" class="patient-image">
  <p id="patientLabel_patient_04">D</p>
</div>
<div class="patient-item" onclick="selectPatientSafe('patient_05', document.getElementById('patientLabel_patient_05').innerText)">
  <img src="BN5.png" class="patient-image">
  <p id="patientLabel_patient_05">E</p>
</div>
  </div>
   <div class="measure-action">
  <button class="view-result-btn" onclick="openMeasurementPageSafe()">Xem kết quả đo</button>
</div>
  </div>

  <script src="app.js"></script>

  <!-- Script an toàn cho trang index -->
  <script>
    // Hàm an toàn tránh lỗi khi các trang khác chưa load
    function selectPatientSafe(id, name) {
      localStorage.setItem('selectedPatientId', id);
      localStorage.setItem('selectedPatientName', name);
      alert(`Đã chọn: ${name}\n\nChuyển sang trang chi tiết bệnh nhân...`);
      // window.location.href = "dashboard.html";   // sau này dùng
    }

    function openMeasurementPageSafe() {
      alert("Chuyển sang trang Kết quả đo...");
      // window.location.href = "measurement.html";
    }
  </script>
</body>
</html>
